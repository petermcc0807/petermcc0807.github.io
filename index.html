<!DOCTYPE html>
<html style="overflow-y: auto;">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta charset="utf-8" />

        <title>APStore</title>

        <link rel="stylesheet" href="css/bulma/bulma.css">
        <link rel="manifest" href="manifest.json" />
    </head>

    <body>
        <div id="MessageDiv" class="columns is-mobile">
            <div class="column is-10 is-offset-1">
                <div class="block">
                    <div class="content mt-5 has-text-centered">
                        <h3>APStore Client v0.0.3</h3>
                    </div>
                </div>
                <div class="block">
                    <div class="content has-text-centered">
                        <button class="button is-success" @click="ping($event)">Ping</button>
                    </div>
                </div>
                <div v-if="message.visible" class="block">
                    <article class="message is-primary">
                        <div class="message-header">
                            <p>Pong</p>
                            <button class="delete" aria-label="delete" @click="close($event)"></button>
                        </div>
                        <div class="message-body">{{ message.text }}</div>
                    </article>
                </div>
                <div class="block">
                    <div class="content has-text-centered">
                        <img src="img/pwa-architecture.png" alt="PWA Architecture" title="PWA Architecture" />
                    </div>
                </div>
            </div>
        </div>

        <script src="js/socket.io/socket.io.js"></script>
        <script src="js/vue/vue.global.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
